<!DOCTYPE html>
<html lang="pt-br">
<head>
     <!---Bootstraps--->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <!----css login---->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center">
        <div class="col-md-6 d-flex align-items-center">
          <div class="cadastro_cliente-container w-100">
            <h2 class="text-center mb-4">Cadastro de Veículos</h2>

        <form>
            
            <div class="mb-3">
                <label class="form-label">TIPO DE VEICULO</label>
                <input type="text" class="form-control rounded-pill" placeholder="Automovel ou Motocicleta" required>
        </div>
        <div class="form-row">
            <div class="form-group col-md-6">
                <label class="form-label">PLACA</label>
                <input type="text" class="form-control rounded-pill" placeholder="1234ABC" required>
            </div>
        
            <div class="form-group col-md-6">
                <label class="form-label">ANO</label>
                <input type="text" class="form-control rounded-pill" placeholder="0000" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group col-md-6">
                <label class="form-label">MARCA</label>
                <input type="text" class="form-control rounded-pill" placeholder="Marca do veiculo" required>
            </div>
        
            <div class="form-group col-md-6">
                <label class="form-label">MODELO</label>
                <input type="text" class="form-control rounded-pill" placeholder="Modelo do veiculo" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group col-md-6">
                <label class="form-label">QUILOMETRAGE</label>
                <input type="text" class="form-control rounded-pill" placeholder="00,00KM" required>
            </div>
        
            <div class="form-group col-md-6">
                <label class="form-label">COR</label>
                <input type="text" class="form-control rounded-pill" placeholder="Cor do veiculo" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">DESCRIÇÃO DETALHADA</label>
            <input type="text" class="form-control rounded-pill" placeholder="Escreva detalhes relevantes aqui" required>
        </div>

        <div class="text-center mb-3">
            <a href="home.html" type="button" class="btn btn-primary rounded-pill btn-dark btn-lg btn-block">Cadastrar veículo</a>
        </div>

        <div class="text-center mb-3">
            <a href="home.html" type="button" class="btn btn-secondary btn-lg  btn-block">Cancelar </a>
        </div>

        </form>
        </div>
    </div>

</body>
</html>
